kind = "web"
previewPath = "/"
title = "CodeBridge"
version = "1.0.0"
id = "artifacts/cloudlift"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23326

[services.development]
run = "pnpm --filter @workspace/cloudlift run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloudlift", "run", "build" ]
publicDir = "artifacts/cloudlift/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23326"
BASE_PATH = "/"
